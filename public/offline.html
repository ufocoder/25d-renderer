<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Нет подключения | 2.5D Renderer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, system-ui, Avenir, Helvetica, Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #1f2a44;
        background: #f8faff;
      }

      main {
        width: min(100%, 480px);
        border: 1px solid #d8deea;
        background: #ffffff;
        padding: 32px;
        text-align: center;
        box-shadow: 0 8px 24px rgba(31, 42, 68, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 24px;
        color: #4a5a75;
        line-height: 1.6;
      }

      button {
        min-height: 40px;
        border: 1px solid #9eb3da;
        background: #dce6fa;
        padding: 0 16px;
        color: #1f2a44;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #c8d8f5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Нет подключения</h1>
      <p>
        Страница недоступна без сети и еще не сохранена в кэше. Проверьте подключение и попробуйте снова.
      </p>
      <button type="button" onclick="window.location.reload()">Повторить</button>
    </main>
  </body>
</html>
